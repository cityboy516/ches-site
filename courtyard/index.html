<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Courtyard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1 id="levelTitle">LEVEL 1 — THE COURTYARD</h1>
<div id="hud">
  <span>Lives: <b id="livesCount">3</b></span>
  <span>Coins: <b id="coinCount">0</b> / <span id="coinTotal">5</span></span>
  <span id="keyHud">Key: <b id="keyCount">0</b> / <span id="keyTotal">0</span></span>
  <span id="statusMsg">Find all 5 coins to unlock the exit</span>
</div>
<div id="gameShell">
  <canvas id="c" width="800" height="600" tabindex="0"></canvas>
  <div id="controlsPanel">
    <button id="controlsToggle" type="button" aria-expanded="false" aria-controls="dpad">Controls</button>
    <div id="dpad" hidden>
      <button id="btn-up">▲</button>
      <button id="btn-left">◀</button>
      <button id="btn-right">▶</button>
      <button id="btn-down">▼</button>
    </div>
  </div>
</div>
<div id="hint">Arrow keys · optional touch controls</div>

<!-- Level complete overlay -->
<div id="winOverlay" class="overlay">
  <h2 style="color:#f0b429">LEVEL COMPLETE!</h2>
  <p id="winMsg">You made it through.</p>
  <button id="nextBtn">Next Level →</button>
</div>

<!-- Game over overlay -->
<div id="gameOverOverlay" class="overlay">
  <h2 style="color:#e74c3c">GAME OVER</h2>
  <p>You ran out of lives.</p>
  <button id="restartBtn">Play Again</button>
</div>

<div id="back"><a href="/">← ches.uk</a></div>
<div id="build">build: 25 Apr 2026 b</div>

<script src="js/constants.js"></script>
<script src="js/levels/index.js"></script>
<script src="js/levels/level-1.js"></script>
<script src="js/levels/level-2.js"></script>
<script src="js/levels/level-3.js"></script>
<script src="js/levels/level-4.js"></script>
<script src="js/levels/level-5.js"></script>
<script src="js/levels/level-6.js"></script>
<script src="js/state.js"></script>
<script src="js/collision.js"></script>
<script src="js/enemies.js"></script>
<script src="js/input.js"></script>
<script src="js/update.js"></script>
<script src="js/renderer.js"></script>
<script src="js/main.js"></script>
</body>
</html>
