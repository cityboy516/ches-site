<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Courtyard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #ccc; gap: 10px;
  }
  h1 { color: #f0b429; font-size: 20px; letter-spacing: 3px; margin-top: 12px; }
  #hud { display: flex; gap: 32px; font-size: 15px; }
  #hud b { color: #f0b429; }
  #statusMsg { color: #aaa; }
  #statusMsg.unlocked { color: #2ecc71; }
  canvas { border: 2px solid #2a2a4a; display: block; }
  #hint { font-size: 12px; color: #444; }
  #back { font-size: 12px; color: #444; margin-bottom: 10px; }
  #back a { color: #555; text-decoration: none; }
  #back a:hover { color: #888; }

  /* D-pad */
  #dpad {
    display: grid;
    grid-template-columns: repeat(3, 64px);
    grid-template-rows: repeat(3, 64px);
    gap: 6px;
    margin: 6px 0;
  }
  #btn-up    { grid-column: 2; grid-row: 1; }
  #btn-left  { grid-column: 1; grid-row: 2; }
  #btn-right { grid-column: 3; grid-row: 2; }
  #btn-down  { grid-column: 2; grid-row: 3; }
  #dpad button {
    width: 64px; height: 64px;
    background: rgba(255,255,255,0.06);
    border: 2px solid #2e2e50;
    border-radius: 12px;
    color: #666;
    font-size: 22px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    transition: background 0.08s, border-color 0.08s, color 0.08s;
  }
  #dpad button.pressed {
    background: rgba(240,180,41,0.18);
    border-color: #f0b429;
    color: #f0b429;
  }

  /* Win / Game Over overlays */
  .overlay {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    flex-direction: column;
    align-items: center;
    gap: 18px;
    background: rgba(10,10,20,0.93);
    border: 2px solid #f0b429;
    border-radius: 14px;
    padding: 36px 48px;
    z-index: 10;
    text-align: center;
  }
  .overlay.active { display: flex; }
  .overlay h2 { font-size: 28px; letter-spacing: 3px; }
  .overlay p  { font-size: 15px; color: #aaa; }
  .overlay button {
    margin-top: 6px;
    padding: 10px 32px;
    background: rgba(240,180,41,0.12);
    border: 2px solid #f0b429;
    border-radius: 8px;
    color: #f0b429;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .overlay button:hover { background: rgba(240,180,41,0.28); }
  #gameOverOverlay { border-color: #e74c3c; }
  #gameOverOverlay button { border-color: #e74c3c; color: #e74c3c; background: rgba(231,76,60,0.1); }
  #gameOverOverlay button:hover { background: rgba(231,76,60,0.25); }
</style>
</head>
<body>
<h1 id="levelTitle">LEVEL 1 — THE COURTYARD</h1>
<div id="hud">

  <span>Coins: <b id="coinCount">0</b> / <span id="coinTotal">5</span></span>
  <span id="statusMsg">Find all 5 coins to unlock the exit</span>
</div>
<canvas id="c" width="800" height="600" tabindex="0"></canvas>
<div id="hint">Arrow keys · or use the buttons below on mobile</div>

<!-- Level complete overlay -->
<div id="winOverlay" class="overlay">
  <h2 style="color:#f0b429">LEVEL COMPLETE!</h2>
  <p id="winMsg">You made it through.</p>
  <button id="nextBtn">Next Level →</button>
</div>

<!-- Game over overlay -->
<div id="gameOverOverlay" class="overlay">
  <h2 style="color:#e74c3c">GAME OVER</h2>
  <p>You ran out of lives.</p>
  <button id="restartBtn">Play Again</button>
</div>

<div id="dpad">
  <button id="btn-up">▲</button>
  <button id="btn-left">◀</button>
  <button id="btn-right">▶</button>
  <button id="btn-down">▼</button>
</div>
<div id="back"><a href="/">← ches.uk</a></div>

let map = [], ROWS, COLS, TOTAL_COINS;
let currentLevel = 0;
let lives = 3;
let gameOver = false;
let enemies = [];

const player = {
  x: 46, y: 46,
  w: 28, h: 28,
  speed: 3,
  facing: 'right',
  coins: 0,
  won: false,
};

const keys = {};
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  keys[e.key] = true;
});
window.addEventListener('keyup', e => { delete keys[e.key]; });

function loadLevel(n) {
  currentLevel = n;
  // Deep-copy map so collected coins / opened exits don't persist across respawns
  map = levels[n].map.map(row => [...row]);
  ROWS = map.length;
  COLS = map[0].length;
  TOTAL_COINS = levels[n].totalCoins;

  // Reset player
  player.x = levels[n].playerStart.x;
  player.y = levels[n].playerStart.y;
  player.coins = 0;
  player.won = false;
  player.facing = 'right';

  // Reset enemies — shallow spread is safe: path array is read-only, only pathIndex/facing change
  enemies = (levels[n].enemies || []).map(e => ({ ...e, pathIndex: 0, facing: 'right', mode: 'patrol' }));

  // Update HUD
  document.getElementById('levelTitle').textContent = 'LEVEL ' + (n + 1) + ' — ' + levels[n].name;
  document.getElementById('coinCount').textContent = '0';
  document.getElementById('coinTotal').textContent = TOTAL_COINS;
  document.getElementById('livesCount').textContent = lives;
  const status = document.getElementById('statusMsg');
  status.textContent = 'Find all ' + TOTAL_COINS + ' coins to unlock the exit';
  status.classList.remove('unlocked');

  // Hide overlays
  document.getElementById('winOverlay').classList.remove('active');
  document.getElementById('gameOverOverlay').classList.remove('active');

  gameOver = false;
}

function tile(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return 1;
  return map[r][c];
}

function hitsWall(x, y, w, h) {
  const r0 = Math.floor(y / T),         r1 = Math.floor((y + h - 1) / T);
  const c0 = Math.floor(x / T),         c1 = Math.floor((x + w - 1) / T);
  for (let r = r0; r <= r1; r++)
    for (let c = c0; c <= c1; c++) {
      const t = tile(r, c);
      // 1=wall, 3=locked exit are solid. Fire (5) is passable — it kills, not blocks.
      if (t === 1 || t === 3) return true;
    }
  return false;
}

function touching(x, y, w, h, val) {
  const r0 = Math.floor(y / T),         r1 = Math.floor((y + h - 1) / T);
  const c0 = Math.floor(x / T),         c1 = Math.floor((x + w - 1) / T);
  for (let r = r0; r <= r1; r++)
    for (let c = c0; c <= c1; c++)
      if (tile(r, c) === val) return {r, c};
  return null;
}

function overlapsPlayer(e) {
  return player.x < e.x + e.w && player.x + player.w > e.x &&
         player.y < e.y + e.h && player.y + player.h > e.y;
}

function playerInCone(e) {
  const cx = e.x + e.w / 2, cy = e.y + e.h / 2;
  const px = player.x + player.w / 2, py = player.y + player.h / 2;
  const dx = px - cx, dy = py - cy;
  if (Math.hypot(dx, dy) > CONE_RANGE) return false;
  const faceAngle = { right: 0, left: Math.PI, up: -Math.PI / 2, down: Math.PI / 2 }[e.facing];
  let diff = Math.abs(Math.atan2(dy, dx) - faceAngle);
  if (diff > Math.PI) diff = 2 * Math.PI - diff; // normalise — prevents wrap-around false negatives
  return diff <= CONE_HALF_ANGLE;
}

function killPlayer() {
  lives--;
  document.getElementById('livesCount').textContent = lives;
  if (lives < 0) {
    gameOver = true;
    document.getElementById('gameOverOverlay').classList.add('active');
  } else {
    loadLevel(currentLevel);
  }
}

function updateEnemies(dt) {
  for (const e of enemies) {
    if (e.mode === 'patrol') {
      // Waypoint patrol
      const target = e.path[e.pathIndex];
      const ddx = target.x - e.x, ddy = target.y - e.y;
      const dist = Math.hypot(ddx, ddy);
      if (dist < 3) {
        e.x = target.x; e.y = target.y;
        e.pathIndex = (e.pathIndex + 1) % e.path.length;
      } else {
        e.x += (ddx / dist) * e.speed * dt;
        e.y += (ddy / dist) * e.speed * dt;
        e.facing = Math.abs(ddx) > Math.abs(ddy)
          ? (ddx > 0 ? 'right' : 'left')
          : (ddy > 0 ? 'down' : 'up');
      }
      // Only cone-aware enemies (those with chaseSpeed) can switch to chase
      if (e.chaseSpeed && playerInCone(e)) e.mode = 'chase';

    } else {
      // Chase: move toward player with wall-slide collision
      const cx = e.x + e.w / 2, cy = e.y + e.h / 2;
      const px = player.x + player.w / 2, py = player.y + player.h / 2;
      const dx = px - cx, dy = py - cy;
      const dist = Math.hypot(dx, dy);
      if (dist > 1) {
        const spd = (e.chaseSpeed || e.speed * 2) * dt;
        const mx = (dx / dist) * spd, my = (dy / dist) * spd;
        // Apply x and y independently for smooth wall-sliding
        if (!hitsWall(e.x + mx, e.y,      e.w, e.h)) e.x += mx;
        if (!hitsWall(e.x,      e.y + my, e.w, e.h)) e.y += my;
        e.facing = Math.abs(dx) > Math.abs(dy)
          ? (dx > 0 ? 'right' : 'left')
          : (dy > 0 ? 'down' : 'up');
      }
      // Return to patrol when player leaves the cone
      if (!playerInCone(e)) e.mode = 'patrol';
    }
  }
}

function update(dt) {
  if (player.won || gameOver) return;

  let dx = 0, dy = 0;
  if (keys['ArrowLeft'])  { dx = -player.speed * dt; player.facing = 'left'; }
  if (keys['ArrowRight']) { dx =  player.speed * dt; player.facing = 'right'; }
  if (keys['ArrowUp'])    { dy = -player.speed * dt; player.facing = 'up'; }
  if (keys['ArrowDown'])  { dy =  player.speed * dt; player.facing = 'down'; }

  const nx = player.x + dx;
  if (!hitsWall(nx, player.y, player.w, player.h)) player.x = nx;
  const ny = player.y + dy;
  if (!hitsWall(player.x, ny, player.w, player.h)) player.y = ny;

  updateEnemies(dt);

  // Coin collection
  const coin = touching(player.x, player.y, player.w, player.h, 2);
  if (coin) {
    map[coin.r][coin.c] = 0;
    player.coins++;
    document.getElementById('coinCount').textContent = player.coins;
    if (player.coins >= TOTAL_COINS) {
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (map[r][c] === 3) map[r][c] = 4;
      const el = document.getElementById('statusMsg');
      el.textContent = '✓ Exit unlocked — reach the door!';
      el.classList.add('unlocked');
    }
  }

  // Exit reached
  if (touching(player.x, player.y, player.w, player.h, 4)) {
    player.won = true;
    const isLast = currentLevel + 1 >= levels.length;
    document.getElementById('winMsg').textContent = isLast
      ? 'You completed the game!' : 'You made it through.';
    document.getElementById('nextBtn').textContent = isLast ? 'Play Again' : 'Next Level →';
    document.getElementById('winOverlay').classList.add('active');
    return;
  }

  // Fire death — tile 5 is passable but lethal
  if (touching(player.x, player.y, player.w, player.h, 5)) {
    killPlayer();
    return;
  }

  // Enemy collision — AABB overlap with any guard
  for (const enemy of enemies) {
    if (overlapsPlayer(enemy)) {
      killPlayer();
      return; // prevent further checks on now-reset state
    }
  }
}

let tick = 0;

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);   ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);   ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x, y + r);       ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

function drawMap() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * T, y = r * T, t = map[r][c];

      if (t === 1) {
        ctx.fillStyle = '#252545'; ctx.fillRect(x, y, T, T);
        ctx.fillStyle = '#363668'; ctx.fillRect(x + 2, y + 2, T - 4, T - 9);
        ctx.fillStyle = '#1a1a30'; ctx.fillRect(x, y + T - 7, T, 7);
      } else {
        ctx.fillStyle = '#16162a'; ctx.fillRect(x, y, T, T);
        ctx.strokeStyle = '#1e1e38'; ctx.lineWidth = 0.5; ctx.strokeRect(x, y, T, T);

        if (t === 2) {
          const scale = 1 + 0.18 * Math.sin(tick * 0.07 + c * 0.9 + r * 0.7);
          ctx.save();
          ctx.translate(x + T / 2, y + T / 2);
          ctx.shadowColor = '#f0b429'; ctx.shadowBlur = 12;
          ctx.fillStyle = '#f0b429';
          ctx.beginPath(); ctx.arc(0, 0, 7 * scale, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#ffe066';
          ctx.beginPath(); ctx.arc(-2, -2, 2.5 * scale, 0, Math.PI * 2); ctx.fill();
          ctx.shadowBlur = 0;
          ctx.restore();

        } else if (t === 3) {
          ctx.fillStyle = '#5a0a0a'; ctx.fillRect(x + 4, y + 4, T - 8, T - 8);
          ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 2; ctx.strokeRect(x + 4, y + 4, T - 8, T - 8);
          ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 11px Courier New';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('LOCKED', x + T / 2, y + T / 2);

        } else if (t === 4) {
          const glow = 0.5 + 0.5 * Math.sin(tick * 0.05);
          ctx.shadowColor = '#2ecc71'; ctx.shadowBlur = 20 * glow;
          ctx.fillStyle = `rgba(39,174,96,${0.55 + 0.3 * glow})`;
          ctx.fillRect(x + 4, y + 4, T - 8, T - 8);
          ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2;
          ctx.strokeRect(x + 4, y + 4, T - 8, T - 8);
          ctx.fillStyle = '#afffcf'; ctx.font = 'bold 11px Courier New';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('EXIT', x + T / 2, y + T / 2);
          ctx.shadowBlur = 0;

        } else if (t === 5) {
          // Fire tile — each tile flickers independently using its grid position as offset
          const flicker = Math.sin(tick * 0.13 + c * 1.7 + r * 2.3);
          ctx.shadowColor = '#ff6b00';
          ctx.shadowBlur = 14 + 8 * Math.abs(flicker);
          ctx.fillStyle = flicker > 0 ? '#ff6b00' : '#c0392b';
          ctx.fillRect(x + 5, y + 5, T - 10, T - 10);
          // Inner hot spot
          ctx.fillStyle = 'rgba(255,220,100,0.55)';
          ctx.beginPath(); ctx.arc(x + T / 2, y + T / 2, 5, 0, Math.PI * 2); ctx.fill();
          ctx.shadowBlur = 0; // always reset — glow bleeds into adjacent tiles if left set
        }
      }
    }
  }
}

function drawEnemies() {
  for (const e of enemies) {
    const { x, y, w, h, facing } = e;

    // Vision cone — only for cone-aware enemies (those with chaseSpeed)
    if (e.chaseSpeed !== undefined) {
      const faceAngle = { right: 0, left: Math.PI, up: -Math.PI / 2, down: Math.PI / 2 }[facing];
      const cx = x + w / 2, cy = y + h / 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, CONE_RANGE, faceAngle - CONE_HALF_ANGLE, faceAngle + CONE_HALF_ANGLE);
      ctx.closePath();
      ctx.fillStyle = e.mode === 'chase'
        ? 'rgba(231,76,60,0.18)'    // red when chasing
        : 'rgba(142,68,173,0.10)';  // faint purple when patrolling
      ctx.fill();
    }

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x + w / 2 + 2, y + h + 3, w / 2 - 2, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body — purple
    roundRect(x, y, w, h, 5);
    ctx.fillStyle = '#8e44ad'; ctx.fill();
    ctx.strokeStyle = '#6c3483'; ctx.lineWidth = 2; ctx.stroke();

    // Top highlight
    roundRect(x + 3, y + 2, w - 6, 8, 3);
    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();

    // Directional eye (same layout as player)
    const eyePos = {
      right: [x + w - 10, y + h / 2 - 3],
      left:  [x + 4,      y + h / 2 - 3],
      up:    [x + w / 2 - 3, y + 4],
      down:  [x + w / 2 - 3, y + h - 10],
    };
    const [ex, ey] = eyePos[facing];
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ex + 3, ey + 3, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(ex + 3, ey + 3, 2, 0, Math.PI * 2); ctx.fill();
  }
}

function drawPlayer() {
  const { x, y, w, h, facing } = player;

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x + w / 2 + 2, y + h + 3, w / 2 - 2, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  roundRect(x, y, w, h, 5);
  ctx.fillStyle = '#e74c3c'; ctx.fill();
  ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 2; ctx.stroke();

  roundRect(x + 3, y + 2, w - 6, 8, 3);
  ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fill();

  const eyePos = {
    right: [x + w - 10, y + h / 2 - 3],
    left:  [x + 4,      y + h / 2 - 3],
    up:    [x + w / 2 - 3, y + 4],
    down:  [x + w / 2 - 3, y + h - 10],
  };
  const [ex, ey] = eyePos[facing];
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ex + 3, ey + 3, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(ex + 3, ey + 3, 2, 0, Math.PI * 2); ctx.fill();
}

// Scale canvas to fit smaller screens while keeping internal resolution
function scaleCanvas() {
  const maxW = Math.min(800, window.innerWidth - 8);
  const scale = maxW / 800;
  canvas.style.width  = Math.round(800 * scale) + 'px';
  canvas.style.height = Math.round(600 * scale) + 'px';
}
window.addEventListener('resize', scaleCanvas);
scaleCanvas();

// D-pad touch + click controls
function bindBtn(id, key) {
  const btn = document.getElementById(id);
  const press   = e => { e.preventDefault(); keys[key] = true;  btn.classList.add('pressed'); };
  const release = e => { e.preventDefault(); delete keys[key]; btn.classList.remove('pressed'); };
  btn.addEventListener('touchstart',  press,   { passive: false });
  btn.addEventListener('touchend',    release, { passive: false });
  btn.addEventListener('touchcancel', release, { passive: false });
  btn.addEventListener('mousedown',   press);
  btn.addEventListener('mouseup',     release);
  btn.addEventListener('mouseleave',  release);
}
bindBtn('btn-up',    'ArrowUp');
bindBtn('btn-down',  'ArrowDown');
bindBtn('btn-left',  'ArrowLeft');
bindBtn('btn-right', 'ArrowRight');

// ============================================================
// DEV MODE — type DEV_CODE during play to enable level-skip keys.
const DEV_CODE = 'debug';
let devBuffer = '';
let devModeEnabled = false;
window.addEventListener('keydown', e => {
  if (!devModeEnabled && e.key.length === 1) {
    devBuffer = (devBuffer + e.key.toLowerCase()).slice(-DEV_CODE.length);
    if (devBuffer === DEV_CODE) devModeEnabled = true;
  }
  if (!devModeEnabled) return;
  if (e.key === 'n' || e.key === 'N') {
    player.won = false; gameOver = false; lives = 3;
    loadLevel(Math.min(currentLevel + 1, levels.length - 1));
  }
  if (e.key === 'b' || e.key === 'B') {
    player.won = false; gameOver = false; lives = 3;
    loadLevel(Math.max(currentLevel - 1, 0));
  }
});
// ============================================================

// Overlay button handlers
document.getElementById('nextBtn').addEventListener('click', () => {
  player.won = false;
  if (currentLevel + 1 < levels.length) {
    loadLevel(currentLevel + 1);
  } else {
    // All levels complete — reset to start
    lives = 3;
    loadLevel(0);
  }
});

document.getElementById('restartBtn').addEventListener('click', () => {
  lives = 3;
  loadLevel(0);
});

let lastTime = 0;
function loop(timestamp) {
  // dt: how many 60fps-frames worth of time passed (1.0 = perfect 60fps, 2.0 = 30fps, etc.)
  // Capped at 3 to prevent teleporting through walls if the tab was backgrounded
  const dt = lastTime ? Math.min((timestamp - lastTime) / (1000 / 60), 3) : 1;
  lastTime = timestamp;
  tick++;
  update(dt);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawMap();
  drawEnemies(); // enemies render below player
  drawPlayer();  // player always on top
  // Dim canvas when paused (overlay showing)
  if (player.won || gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  requestAnimationFrame(loop);
}

loadLevel(0);
loop();
</script>
