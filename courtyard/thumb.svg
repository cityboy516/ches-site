<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <!-- Background floor -->
  <rect width="640" height="360" fill="#16162a"/>

  <!-- Floor grid suggestion -->
  <line x1="0" y1="40" x2="640" y2="40" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="0" y1="80" x2="640" y2="80" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="640" y2="120" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="640" y2="160" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="0" y1="200" x2="640" y2="200" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="0" y1="240" x2="640" y2="240" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="0" y1="280" x2="640" y2="280" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="0" y1="320" x2="640" y2="320" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="40" y1="0" x2="40" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="80" y1="0" x2="80" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="120" y1="0" x2="120" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="160" y1="0" x2="160" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="240" y1="0" x2="240" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="280" y1="0" x2="280" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="320" y1="0" x2="320" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="360" y1="0" x2="360" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="440" y1="0" x2="440" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="480" y1="0" x2="480" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="520" y1="0" x2="520" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="560" y1="0" x2="560" y2="360" stroke="#1e1e38" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="360" stroke="#1e1e38" stroke-width="0.5"/>

  <!-- Outer walls -->
  <rect x="0" y="0" width="640" height="40" fill="#252545"/>
  <rect x="0" y="320" width="640" height="40" fill="#252545"/>
  <rect x="0" y="0" width="40" height="360" fill="#252545"/>
  <rect x="600" y="0" width="40" height="360" fill="#252545"/>

  <!-- Some interior walls -->
  <rect x="80"  y="80"  width="160" height="40" fill="#252545"/>
  <rect x="280" y="80"  width="40"  height="120" fill="#252545"/>
  <rect x="360" y="80"  width="120" height="40" fill="#252545"/>
  <rect x="160" y="160" width="40"  height="120" fill="#252545"/>
  <rect x="360" y="200" width="160" height="40" fill="#252545"/>
  <rect x="200" y="240" width="120" height="40" fill="#252545"/>
  <rect x="440" y="240" width="120" height="40" fill="#252545"/>
  <rect x="80"  y="280" width="80"  height="40" fill="#252545"/>
  <rect x="360" y="280" width="40"  height="40" fill="#252545"/>

  <!-- Wall highlights -->
  <rect x="80"  y="82"  width="160" height="6" fill="#363668"/>
  <rect x="360" y="82"  width="120" height="6" fill="#363668"/>

  <!-- Coins (gold circles) -->
  <circle cx="200" cy="60" r="10" fill="#f0b429" opacity="0.9"/>
  <circle cx="460" cy="60" r="10" fill="#f0b429" opacity="0.9"/>
  <circle cx="240" cy="220" r="10" fill="#f0b429" opacity="0.9"/>
  <circle cx="500" cy="300" r="10" fill="#f0b429" opacity="0.9"/>
  <circle cx="100" cy="300" r="10" fill="#f0b429" opacity="0.9"/>

  <!-- Exit (green) -->
  <rect x="560" y="280" width="36" height="36" fill="#27ae60" opacity="0.8" rx="3"/>
  <text x="578" y="301" font-family="Courier New" font-size="10" fill="#afffcf" text-anchor="middle" font-weight="bold">EXIT</text>

  <!-- Player (red square with eye) -->
  <rect x="55" y="55" width="28" height="28" fill="#e74c3c" rx="4"/>
  <circle cx="76" cy="69" r="4" fill="white"/>
  <circle cx="76" cy="69" r="2" fill="#1a1a1a"/>

  <!-- Title overlay -->
  <rect x="0" y="0" width="640" height="360" fill="rgba(0,0,0,0.18)"/>
  <text x="320" y="340" font-family="Courier New" font-size="13" fill="#444" text-anchor="middle">LEVEL 1 — THE COURTYARD</text>
</svg>
